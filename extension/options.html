<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Commonplace Settings</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      .card {
        background: #ffffff;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 28px;
      }
      p {
        margin-top: 0;
        margin-bottom: 18px;
        color: #475569;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid #cbd5e1;
        font-size: 14px;
        margin-bottom: 16px;
      }
      button {
        border: 0;
        border-radius: 14px;
        padding: 12px 16px;
        background: #111827;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      #status {
        margin-top: 14px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <h1>Commonplace</h1>
        <p>Configure the API endpoint and API key used by the extension when saving chats from Claude or ChatGPT.</p>

        <label for="api-endpoint">API endpoint</label>
        <input id="api-endpoint" type="url" placeholder="http://localhost:8000/extract" />

        <label for="api-key">API key</label>
        <input id="api-key" type="password" placeholder="Paste your Commonplace API key" />

        <button id="save-settings" type="button">Save settings</button>
        <div id="status" aria-live="polite"></div>
      </div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
